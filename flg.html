<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" href="./assets/science_fair.png" />
  <title>Interact with FLG Protein</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.1.0/3Dmol-min.js"></script>
  <style>
    :root{
      --bg1:#120814;
      --bg2:#24112d;
      --panel:rgba(30,16,36,.82);
      --text:#fff7fb;
      --muted:#e4cddd;
      --border:rgba(255,255,255,.12);
      --shadow:0 20px 60px rgba(0,0,0,.32);
      --radius:22px;
      --accent:#f08bb4;
      --accent-soft:#f7c2d9;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      height:100vh;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(240,139,180,.18), transparent 24%),
        radial-gradient(circle at top right, rgba(247,194,217,.12), transparent 22%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow:hidden;
    }

    .wrap{
      width:min(1180px,calc(100% - 24px));
      margin:8px auto;
      height:calc(100vh - 16px);
      display:flex;
      flex-direction:column;
    }

    .viewer-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      padding:14px;
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .viewer-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:2px 2px 12px;
    }

    .head-left{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      width:fit-content;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      transition:.18s ease;
    }

    .back-link:hover{
      transform:translateY(-1px);
      border-color:rgba(240,139,180,.45);
      background:rgba(255,255,255,.10);
      text-decoration:none;
    }

    .viewer-label{
      margin:0;
      font-size:1.2rem;
      font-weight:700;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:9px 13px;
      border-radius:999px;
      font-weight:600;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      border-color:rgba(240,139,180,.45);
      background:rgba(255,255,255,.10);
    }

    button.active{
      background:rgba(240,139,180,.14);
      border-color:rgba(240,139,180,.55);
    }

    .viewer-shell{
      position:relative;
      width:100%;
      flex:1;
      min-height:0;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--border);
      background:
        radial-gradient(circle at center, rgba(240,139,180,.10), transparent 30%),
        linear-gradient(180deg,#1a0c1f,#0b0610);
    }

    #viewer{ width:100%; height:100%; }

    .overlay{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      text-align:center;
      padding:24px;
      background:linear-gradient(180deg,rgba(11,6,16,.48),rgba(11,6,16,.25));
      z-index:2;
      transition:opacity .35s ease;
    }

    .overlay.hidden{ opacity:0; pointer-events:none; }

    .overlay-card{
      max-width:520px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(26,12,31,.78);
      box-shadow:var(--shadow);
      font-weight:600;
      line-height:1.5;
    }

    .footer{
      padding:8px 4px 2px;
      color:var(--muted);
      font-size:.9rem;
    }

    a{ color:var(--accent-soft); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    @media (max-width:700px){
      .wrap{ width:min(100% - 14px,1180px); margin:8px auto; height:calc(100vh - 16px); }
      .viewer-card{ padding:12px; }
      button{ width:calc(50% - 4px); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="viewer-card">
      <div class="viewer-head">
        <div class="head-left">
          <a href="./index.html" class="back-link">← Back to Home</a>
          <p class="viewer-label">Interact with FLG Protein</p>
        </div>
        <div class="controls">
          <button id="cartoonBtn" class="active">Cartoon</button>
          <button id="surfaceBtn">Surface</button>
          <button id="spinBtn" class="active">Spin</button>
        </div>
      </div>

      <div class="viewer-shell">
        <div id="viewer"></div>
        <div class="overlay" id="overlay">
          <div class="overlay-card" id="overlayText">Loading FLG (4PCW)...</div>
        </div>
      </div>

      <div class="footer">
        Source: <a href="https://www.rcsb.org/structure/4PCW" target="_blank" rel="noreferrer">RCSB PDB 4PCW</a>
      </div>
    </section>
  </main>

  <script>
    let viewer;
    let currentMode = "cartoon";
    let spinning = true;

    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const cartoonBtn = document.getElementById("cartoonBtn");
    const surfaceBtn = document.getElementById("surfaceBtn");
    const spinBtn = document.getElementById("spinBtn");

    function setActive(button) {
      [cartoonBtn, surfaceBtn].forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");
    }

    function fitModel() {
      if (!viewer) return;
      viewer.zoomTo();

      const isMobile = window.innerWidth <= 700;
      if (isMobile) {
        viewer.zoom(0.72);
      } else {
        viewer.zoom(1.02);
      }

      viewer.render();
    }

    function applyCartoon() {
      if (!viewer) return;
      viewer.setStyle({}, {});
      viewer.removeAllSurfaces();
      viewer.setStyle({}, { cartoon: { color: "spectrum" } });
      currentMode = "cartoon";
      setActive(cartoonBtn);
      fitModel();
    }

    function applySurface() {
      if (!viewer) return;
      viewer.setStyle({}, {});
      viewer.removeAllSurfaces();
      viewer.setStyle({}, { cartoon: { color: "white", opacity: 0.22 } });
      viewer.addSurface($3Dmol.VDW, { opacity: 0.78, color: "lightpink" });
      currentMode = "surface";
      setActive(surfaceBtn);
      fitModel();
    }

    function toggleSpin() {
      if (!viewer) return;
      spinning = !spinning;
      if (spinning) {
        viewer.spin({x: 0, y: 1, z: 0, speed: 0.5});
      } else {
        viewer.spin(false);
      }
      spinBtn.classList.toggle("active", spinning);
      viewer.render();
    }

    async function initializeViewer() {
      const element = document.getElementById("viewer");

      viewer = $3Dmol.createViewer(element, {
        backgroundColor: "#1a0c1f",
        antialias: false
      });

      try {
        const response = await fetch("https://files.rcsb.org/download/4PCW.cif");
        if (!response.ok) throw new Error("Could not fetch CIF structure.");
        const cifText = await response.text();

        viewer.addModel(cifText, "cif");
        applyCartoon();
        viewer.render();

        overlay.classList.add("hidden");
        setTimeout(() => {
          overlay.style.display = "none";
          viewer.spin({x: 0, y: 1, z: 0, speed: 0.5});
          spinBtn.classList.add("active");
        }, 100);
      } catch (error) {
        overlayText.innerHTML = "Could not load FLG right now.<br><br>Open the browser console to inspect the error.";
        console.error(error);
      }
    }

    cartoonBtn.addEventListener("click", applyCartoon);
    surfaceBtn.addEventListener("click", applySurface);
    spinBtn.addEventListener("click", toggleSpin);

    window.addEventListener("resize", () => {
      if (!viewer) return;
      viewer.resize();
      fitModel();
    });

    initializeViewer();
  </script>
</body>
</html>
