<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interact with Gemfibrozil</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.1.0/3Dmol-min.js"></script>
  <style>
    :root{
      --bg1:#050913;
      --bg2:#091224;
      --panel:rgba(9,18,36,.82);
      --text:#f8fafc;
      --muted:#b8c4d8;
      --border:rgba(255,255,255,.11);
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.15), transparent 25%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    .wrap{
      width:min(1180px,calc(100% - 24px));
      margin:14px auto;
    }

    .viewer-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      padding:14px;
    }

    .viewer-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:2px 2px 12px;
    }

    .head-left{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      width:fit-content;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      transition:.18s ease;
    }

    .back-link:hover{
      transform:translateY(-1px);
      border-color:rgba(56,189,248,.45);
      background:rgba(255,255,255,.10);
      text-decoration:none;
    }

    .viewer-label{
      margin:0;
      font-size:1.2rem;
      font-weight:700;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:9px 13px;
      border-radius:999px;
      font-weight:600;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      border-color:rgba(56,189,248,.45);
      background:rgba(255,255,255,.10);
    }

    button.active{
      background:rgba(56,189,248,.14);
      border-color:rgba(56,189,248,.55);
    }

    .viewer-shell{
      position:relative;
      width:100%;
      height:min(84vh,900px);
      min-height:560px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--border);
      background:
        radial-gradient(circle at center, rgba(56,189,248,.08), transparent 30%),
        linear-gradient(180deg,#06101f,#020712);
    }

    #viewer{
      width:100%;
      height:100%;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      text-align:center;
      padding:24px;
      background:linear-gradient(180deg,rgba(2,7,18,.48),rgba(2,7,18,.25));
      z-index:2;
      transition:opacity .35s ease;
    }

    .overlay.hidden{
      opacity:0;
      pointer-events:none;
    }

    .overlay-card{
      max-width:520px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(10,15,30,.78);
      box-shadow:var(--shadow);
      font-weight:600;
      line-height:1.5;
    }

    .footer{
      padding:8px 4px 2px;
      color:var(--muted);
      font-size:.9rem;
    }

    a{
      color:#7dd3fc;
      text-decoration:none;
    }

    a:hover{
      text-decoration:underline;
    }

    @media (max-width:700px){
      .wrap{
        width:min(100% - 14px,1180px);
        margin:8px auto 14px;
      }

      .viewer-card{
        padding:12px;
      }

      .viewer-shell{
        min-height:420px;
        height:72vh;
      }

      button{
        width:calc(50% - 4px);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="viewer-card">
      <div class="viewer-head">
        <div class="head-left">
          <a href="./index.html" class="back-link">← Back to Home</a>
          <p class="viewer-label">Interact with Gemfibrozil</p>
        </div>
        <div class="controls">
          <button id="stickBtn" class="active">Stick</button>
          <button id="sphereBtn">Sphere</button>
          <button id="spinBtn" class="active">Spin</button>
          <button id="resetBtn">Reset</button>
        </div>
      </div>

      <div class="viewer-shell">
        <div id="viewer"></div>
        <div class="overlay" id="overlay">
          <div class="overlay-card" id="overlayText">Loading Gemfibrozil...</div>
        </div>
      </div>

      <div class="footer">
        Source:
        <a href="https://go.drugbank.com/drugs/DB01241" target="_blank" rel="noreferrer">DrugBank DB01241</a>
      </div>
    </section>
  </main>

  <script>
    let viewer;
    let currentMode = "stick";
    let spinning = true;

    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const stickBtn = document.getElementById("stickBtn");
    const sphereBtn = document.getElementById("sphereBtn");
    const spinBtn = document.getElementById("spinBtn");
    const resetBtn = document.getElementById("resetBtn");

    function setActive(button) {
      [stickBtn, sphereBtn].forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");
    }

    function fitModel() {
      if (!viewer) return;
      viewer.zoomTo();

      const isMobile = window.innerWidth <= 700;
      if (isMobile) {
        viewer.zoom(1.05);
      } else {
        viewer.zoom(1.2);
      }

      viewer.render();
    }

    function applyStick() {
      if (!viewer) return;
      viewer.setStyle({}, {});
      viewer.setStyle({}, {
        stick: {
          radius: 0.22,
          colorscheme: "cyanCarbon"
        }
      });
      currentMode = "stick";
      setActive(stickBtn);
      fitModel();
    }

    function applySphere() {
      if (!viewer) return;
      viewer.setStyle({}, {});
      viewer.setStyle({}, {
        sphere: {
          scale: 0.28,
          colorscheme: "cyanCarbon"
        },
        stick: {
          radius: 0.12,
          colorscheme: "cyanCarbon"
        }
      });
      currentMode = "sphere";
      setActive(sphereBtn);
      fitModel();
    }

    function toggleSpin() {
      if (!viewer) return;
      spinning = !spinning;
      if (spinning) {
        viewer.spin({x: 0, y: 1, z: 0, speed: 0.5});
      } else {
        viewer.spin(false);
      }
      spinBtn.classList.toggle("active", spinning);
      viewer.render();
    }

    function resetView() {
      if (!viewer) return;
      if (currentMode === "sphere") applySphere();
      else applyStick();

      spinning = true;
      viewer.spin({x: 0, y: 1, z: 0, speed: 0.5});
      spinBtn.classList.add("active");
      viewer.render();
    }

    async function initializeViewer() {
      const element = document.getElementById("viewer");
      viewer = $3Dmol.createViewer(element, {
        backgroundColor: "#06101f",
        antialias: false
      });

      try {
        const response = await fetch("./assets/DB01241.txt");
        if (!response.ok) throw new Error("Could not fetch drug structure.");
        const sdfText = await response.text();

        viewer.addModel(sdfText, "sdf");
        applyStick();
        viewer.render();

        overlay.classList.add("hidden");
        setTimeout(() => { 
          overlay.style.display = "none";
          viewer.spin({x: 0, y: 1, z: 0, speed: 0.5});
          spinBtn.classList.add("active");
        }, 100);
      } catch (error) {
        overlayText.innerHTML = "Could not load Gemfibrozil right now.<br><br>Check that assets/DB01241.txt exists.";
        console.error(error);
      }
    }

    stickBtn.addEventListener("click", applyStick);
    sphereBtn.addEventListener("click", applySphere);
    spinBtn.addEventListener("click", toggleSpin);
    resetBtn.addEventListener("click", resetView);

    window.addEventListener("resize", () => {
      if (!viewer) return;
      viewer.resize();
      fitModel();
    });

    initializeViewer();
  </script>
</body>
</html>
